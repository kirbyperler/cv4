<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collective Login</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">

  <img src="collectivelogo2.png" alt="Collective Logo" class="logo">

  <h1>Log In</h1>

  <form id="loginForm">

    <input
      type="text"
      id="username"
      placeholder="Username"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    >

    <button type="submit">
      Access Portal
    </button>

  </form>

  <a href="index.html" class="back-link">
    Return Home
  </a>

</div>

<script src="login.js"></script>

</body>
</html>
